name: CI

on:
  push:
    branches: ["main", "release-*"]
  pull_request:
    branches: ["main"]

# Cancel in-flight runs for the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:
  js-test:
    strategy:
      fail-fast: false
      matrix:
        # Supported window per javascript/README.md ("Works in Node.js 18+").
        node-version: ["18", "20", "22"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bursar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # store-integration.test.ts runs under describe.runIf(DATABASE_URL); with
      # this set the PostgresStore integration + concurrency tests RUN, not skip.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/bursar
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: Check max_connections
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "SHOW max_connections;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "SELECT count(*) FROM pg_stat_activity WHERE datname='bursar';"
      - name: npm ci
        run: npm ci
        working-directory: javascript
      - name: npx vitest run --coverage
        run: npx vitest run --coverage
        working-directory: javascript
        env:
          NODE_OPTIONS: --max-old-space-size=8192
      - name: Post-mortem connection count
        if: always()
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -c "SELECT count(*) FROM pg_stat_activity;" -t
          PGPASSWORD=postgres psql -h localhost -U postgres -c "SELECT state, count(*) FROM pg_stat_activity GROUP BY state;" -t
          PGPASSWORD=postgres psql -h localhost -U postgres -c "SELECT application_name, count(*) FROM pg_stat_activity GROUP BY application_name ORDER BY count DESC;" -t

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: javascript
      - name: npx prettier --check
        run: npx prettier --check .
        working-directory: javascript

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: javascript
      - name: npx tsc --noEmit
        run: npx tsc --noEmit
        working-directory: javascript

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bursar
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@f677139bbe7f9c59b41e40162b753c062f5d49a3 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install uv
        uses: astral-sh/setup-uv@4db96194cae173cdf51185b804e2164b0df394d2 # v5
      - name: Install bursar
        run: uv sync --frozen
        working-directory: python
      - name: Run pytest --cov=bursar --cov-branch --cov-report=term-missing --cov-report=xml
        run: uv run pytest --cov=bursar --cov-branch --cov-report=term-missing --cov-report=xml
        working-directory: python

  js-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: javascript/package-lock.json
      - name: npm ci
        run: npm ci
        working-directory: javascript
      - name: npx tsc --noEmit
        run: npx tsc --noEmit
        working-directory: javascript

  parity-gate:
    needs: [js-test, test, lint, typecheck, js-typecheck]
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: parity gate passed
        run: echo "All tests pass — parity gate is open."

  release-npm:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')
    needs: [parity-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: javascript
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org
      - name: npm ci
        run: npm ci
      - name: npm run build
        run: npm run build
      - name: npm publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  release-pypi:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')
    needs: [parity-gate]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build and publish to PyPI
        uses: JRubics/poetry-publish@e1d0c94e6c2bf70e3a5091e2be186ef57f1e75da # v2.2
        with:
          pypi_token: ${{ secrets.PYPI_TOKEN }}
          ignore_dev_requirements: "yes"
